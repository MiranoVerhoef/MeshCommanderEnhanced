name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm run test:web
      - run: npm run build:web

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - run: dotnet test src/MeshCommander.Server.Tests/MeshCommander.Server.Tests.csproj --property:SkipWebBuild=false

  windows-winui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - uses: microsoft/setup-msbuild@v3
      - name: Build WinUI shell
        run: msbuild src/MeshCommander.Windows/MeshCommander.Windows.csproj /restore /p:Configuration=Release

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker build -t meshcommander-enhanced:ci .
