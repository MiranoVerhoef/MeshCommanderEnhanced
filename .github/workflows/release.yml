name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64, osx-x64, osx-arm64, win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Publish server
        run: dotnet publish src/MeshCommander.Server/MeshCommander.Server.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o artifacts/server-${{ matrix.rid }}
      - name: Package server
        shell: bash
        run: |
          cd artifacts/server-${{ matrix.rid }}
          zip -r ../meshcommander-enhanced-server-${{ matrix.rid }}.zip .
      - uses: actions/upload-artifact@v7
        with:
          name: meshcommander-enhanced-server-${{ matrix.rid }}
          path: artifacts/meshcommander-enhanced-server-${{ matrix.rid }}.zip
          if-no-files-found: error

  desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            project: src/MeshCommander.Desktop/MeshCommander.Desktop.csproj
          - os: macos-14
            rid: osx-arm64
            project: src/MeshCommander.Desktop/MeshCommander.Desktop.csproj
          - os: windows-latest
            rid: win-x64
            project: src/MeshCommander.Windows/MeshCommander.Windows.csproj
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - uses: microsoft/setup-msbuild@v3
        if: runner.os == 'Windows'
      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y imagemagick libgtk-3-0 libwebkit2gtk-4.1-0 xvfb
      - name: Publish desktop shell
        if: runner.os != 'Windows'
        run: dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }} --self-contained true -o artifacts/app
      - name: Publish WinUI shell
        if: runner.os == 'Windows'
        run: msbuild ${{ matrix.project }} /restore /t:Publish /p:Configuration=Release /p:RuntimeIdentifier=${{ matrix.rid }} /p:SelfContained=true /p:PublishDir=${{ github.workspace }}\artifacts\app\
      - name: Publish server sidecar
        run: dotnet publish src/MeshCommander.Server/MeshCommander.Server.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o artifacts/app/server
      - name: Package desktop shell
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd artifacts/app
          zip -r ../meshcommander-enhanced-desktop-${{ matrix.rid }}.zip .
      - name: Package Windows desktop shell
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path artifacts/app/* -DestinationPath artifacts/meshcommander-enhanced-desktop-${{ matrix.rid }}.zip
      - name: Build Linux installer
        if: runner.os == 'Linux'
        shell: bash
        run: bash packaging/linux/build-deb.sh artifacts/app artifacts 0.2.0
      - name: Build macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: bash packaging/macos/build-dmg.sh artifacts/app artifacts 0.2.0
      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --version=6.7.1 --no-progress -y
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          & $iscc packaging\windows\MeshCommanderEnhanced.iss "/DMyAppVersion=0.2.0" "/DSourceDir=${{ github.workspace }}\artifacts\app" "/DOutputDir=${{ github.workspace }}\artifacts"
      - name: Smoke-test Linux installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo dpkg -i artifacts/meshcommander-enhanced-linux-x64.deb
          xvfb-run -a meshcommander-enhanced >artifacts/linux-smoke.log 2>&1 &
          app_pid=$!
          trap 'kill ${app_pid} 2>/dev/null || true; pkill -f MeshCommander.Server || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:16990/healthz | grep -q 'MeshCommander Enhanced'; then exit 0; fi
            sleep 1
          done
          cat artifacts/linux-smoke.log
          exit 1
      - name: Verify macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --verify --deep --strict "artifacts/MeshCommander Enhanced.app"
          hdiutil verify artifacts/meshcommander-enhanced-macos-arm64.dmg
      - name: Smoke-test Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $setup = Resolve-Path artifacts\meshcommander-enhanced-windows-x64-setup.exe
          $installLog = Join-Path $env:RUNNER_TEMP 'meshcommander-install.log'
          $installer = Start-Process $setup -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', "/LOG=$installLog" -Wait -PassThru
          if ($installer.ExitCode -ne 0) { Get-Content $installLog; throw "Installer failed with exit code $($installer.ExitCode)." }
          $appPath = Join-Path $env:LOCALAPPDATA 'Programs\MeshCommander Enhanced\MeshCommander.Enhanced.Windows.exe'
          $app = Start-Process $appPath -PassThru
          try {
            $healthy = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              Start-Sleep -Seconds 1
              if ($app.HasExited) { break }
              try {
                $health = Invoke-RestMethod 'http://127.0.0.1:16990/healthz' -TimeoutSec 2
                if ($health.name -eq 'MeshCommander Enhanced') { $healthy = $true; break }
              } catch {}
            }
            if (-not $healthy) {
              $log = Join-Path $env:LOCALAPPDATA 'MeshCommanderEnhanced\desktop.log'
              if (Test-Path $log) { Get-Content $log }
              throw 'Installed Windows client did not become healthy.'
            }
          } finally {
            if (-not $app.HasExited) { Stop-Process -Id $app.Id -Force }
            Get-Process MeshCommander.Server -ErrorAction SilentlyContinue | Stop-Process -Force
          }
      - uses: actions/upload-artifact@v7
        with:
          name: meshcommander-enhanced-desktop-${{ matrix.rid }}
          path: |
            artifacts/meshcommander-enhanced-desktop-${{ matrix.rid }}.zip
            artifacts/meshcommander-enhanced-linux-x64.deb
            artifacts/meshcommander-enhanced-macos-arm64.dmg
            artifacts/meshcommander-enhanced-windows-x64-setup.exe
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [server, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: meshcommander-enhanced-*
          path: release-assets
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --repo "${GITHUB_REPOSITORY}" --verify-tag --generate-notes --title "MeshCommander Enhanced ${GITHUB_REF_NAME}"
